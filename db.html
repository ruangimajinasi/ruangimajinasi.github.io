<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ruang Imajinasi | Database</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div class="container">
  <div class="floating-btn page-switch" role="tablist" aria-label="Navigasi halaman">
    <a class="tab-btn" href="index.html" aria-label="Beranda"><i class="fas fa-home"></i></a>
    <a class="tab-btn active" href="db.html" aria-current="page" aria-label="Database"><i class="fas fa-database"></i></a>
  </div>

  <div class="navbar">
    <div class="logo">
      <h1>Ruang Imajinasi<span></span></h1>
      <span>Streaming Video Bokep Terbaru</span>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Cari disini">
      <button id="searchBtn"><i class="fas fa-search"></i></button>
    </div>
  </div>

  <div class="section-title">
    <h3><i class="fas fa-film"></i> Database Bokep</h3>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <div class="items-per-page">
        <label><i class="fas fa-eye"></i> Tampil</label>
        <select id="limitSelect">
          <option value="6">6</option>
          <option value="9">9</option>
          <option value="12" selected>12</option>
          <option value="18">18</option>
        </select>
      </div>
      <div class="view-all" id="viewAllBtn">Reset <i class="fas fa-undo-alt"></i></div>
    </div>
  </div>

  <div id="moviesGrid" class="movies-grid">
    <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Memuat data...</div>
  </div>

  <div id="paginationContainer" class="pagination-container"></div>

  <footer>
    <div class="container text-center">
      <p class="text-muted mb-0 py-2">© 2026 Ruang imajinasi All rights reserved</p>
    </div>
  </footer>
</div>

<style>
  #moviesGrid.movies-grid {
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1rem;
  }

  #moviesGrid.movies-grid .movie-cards.mobile-single-column {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    min-width: 0;
  }

  #moviesGrid.movies-grid .movie-cards.mobile-single-column .directory-main {
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
  }

  #moviesGrid.movies-grid .movie-cards.mobile-single-column .directory-meta {
    min-width: 0;
    overflow: hidden;
  }

  #moviesGrid.movies-grid .movie-cards.mobile-single-column .movie-title {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  #moviesGrid.movies-grid .movie-cards.mobile-single-column .action-buttons {
    flex-shrink: 0;
    margin-top: 0;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  #moviesGrid.movies-grid .movie-cards.mobile-single-column .btn-watch {
    width: 42px;
    height: 42px;
    padding: 0;
    border-radius: 50%;
    border: none;
    background: rgba(255, 145, 66, 0.16);
    color: #ffb86b;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    cursor: pointer;
    transition: 0.2s;
  }

  #moviesGrid.movies-grid .movie-cards.mobile-single-column .btn-watch:hover {
    background: #ff9142;
    color: #0b0f1c;
  }

  @media (max-width: 600px) {
    #moviesGrid.movies-grid {
      grid-template-columns: 1fr !important;
      gap: 0.9rem;
    }

    #moviesGrid.movies-grid .movie-cards.mobile-single-column {
      flex-direction: row;
      align-items: center;
      gap: 0.75rem;
    }

    #moviesGrid.movies-grid .movie-cards.mobile-single-column .action-buttons {
      width: auto;
      justify-content: flex-end;
      margin-top: 0;
    }
  }
</style>

<div id="videoModal" class="modal-video">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalMovieTitle">Memutar Film</h3>
      <button class="close-modal" id="closeModalBtn">&times;</button>
    </div>
    <div class="video-container">
      <iframe id="youtubeIframe" src="" allowfullscreen></iframe>
    </div>
    <div class="modal-info" id="modalMovieDesc"></div>
  </div>
</div>

<script src="assets/data/ads.js"></script>
<script>
  let moviesData = [];
  let filteredMovies = [];
  let currentPage = 1;
  let itemsPerPage = 12;
  let currentSearchQuery = '';

  const moviesGrid = document.getElementById('moviesGrid');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const viewAllBtn = document.getElementById('viewAllBtn');
  const limitSelect = document.getElementById('limitSelect');
  const paginationContainer = document.getElementById('paginationContainer');
  const modal = document.getElementById('videoModal');
  const youtubeIframe = document.getElementById('youtubeIframe');
  const modalMovieTitle = document.getElementById('modalMovieTitle');
  const modalMovieDesc = document.getElementById('modalMovieDesc');
  const closeModalBtn = document.getElementById('closeModalBtn');

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function (m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function applyFilters() {
    let result = [...moviesData];
    if (currentSearchQuery.trim() !== '') {
      const query = currentSearchQuery.trim().toLowerCase();
      result = result.filter(movie => movie.title.toLowerCase().includes(query));
    }
    filteredMovies = result;
    currentPage = 1;
    renderPagination();
    renderCurrentPageMovies();
  }

  function renderCurrentPageMovies() {
    if (!filteredMovies.length) {
      moviesGrid.innerHTML = '<div class="empty-message"><i class="fas fa-film-slash"></i><br/>Tidak ada data yang cocok</div>';
      return;
    }

    const startIdx = (currentPage - 1) * itemsPerPage;
    const endIdx = startIdx + itemsPerPage;
    const pageMovies = [...filteredMovies].slice(startIdx, endIdx);

    const cardsHTML = pageMovies.map(movie => {
      return `
        <div class="movie-cards mobile-single-column" data-id="${movie.id}">
          <div class="directory-main">
            <div class="directory-icon"><i class="fas fa-folder-open"></i></div>
            <div class="directory-meta">
              <div class="movie-title">${escapeHtml(movie.title)}</div>
              <div class="directory-subtitle">Ruang Imajinasi</div>
            </div>
          </div>
          <div class="action-buttons">
            <button class="btn-watch watch-btn" onclick="ads()" data-id="${movie.id}"><i class="fas fa-play"></i></button>
          </div>
        </div>
      `;
    }).join('');

    moviesGrid.innerHTML = cardsHTML;

    document.querySelectorAll('.watch-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = parseInt(btn.dataset.id);
        const movie = moviesData.find(item => item.id === id);
        if (movie) openVideoModal(movie);
      });
    });
  }

  function renderPagination() {
    const totalItems = filteredMovies.length;
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    if (totalPages <= 1) {
      paginationContainer.innerHTML = '';
      return;
    }

    let paginationHTML = '';
    paginationHTML += `<button class="page-btn" id="prevPageBtn" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> Prev</button>`;

    const maxVisible = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
    let endPage = Math.min(totalPages, startPage + maxVisible - 1);
    if (endPage - startPage + 1 < maxVisible) {
      startPage = Math.max(1, endPage - maxVisible + 1);
    }

    if (startPage > 1) {
      paginationHTML += `<button class="page-btn page-num" data-page="1">1</button>`;
      if (startPage > 2) paginationHTML += `<span class="page-indicator">...</span>`;
    }

    for (let i = startPage; i <= endPage; i++) {
      paginationHTML += `<button class="page-btn page-num ${i === currentPage ? 'active-page' : ''}" data-page="${i}">${i}</button>`;
    }

    if (endPage < totalPages) {
      if (endPage < totalPages - 1) paginationHTML += `<span class="page-indicator">...</span>`;
      paginationHTML += `<button class="page-btn page-num" data-page="${totalPages}">${totalPages}</button>`;
    }

    paginationHTML += `<button class="page-btn" id="nextPageBtn" ${currentPage === totalPages ? 'disabled' : ''}>Next <i class="fas fa-chevron-right"></i></button>`;
    paginationContainer.innerHTML = paginationHTML;

    document.querySelectorAll('.page-num').forEach(btn => {
      btn.addEventListener('click', () => {
        const page = parseInt(btn.dataset.page);
        if (!isNaN(page) && page !== currentPage) {
          currentPage = page;
          renderCurrentPageMovies();
          renderPagination();
          window.scrollTo({ top: 180, behavior: 'smooth' });
        }
      });
    });

    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    prevBtn?.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderCurrentPageMovies(); renderPagination(); } });
    nextBtn?.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderCurrentPageMovies(); renderPagination(); } });
  }

  function openVideoModal(movie) {
    let embedUrl = movie.link || '';
    if (!embedUrl) return;
    if (!/^https?:\/\//i.test(embedUrl)) {
      embedUrl = `https://dood.re/e/${embedUrl}`;
    }
    youtubeIframe.src = embedUrl;
    youtubeIframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
    youtubeIframe.allowFullscreen = true;
    modalMovieTitle.innerText = movie.title || 'Memutar Film';
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    youtubeIframe.src = '';
    modal.classList.remove('active');
    document.body.style.overflow = '';
  }

  function performSearch() {
    currentSearchQuery = searchInput.value;
    applyFilters();
  }

  function resetAll() {
    searchInput.value = '';
    currentSearchQuery = '';
    applyFilters();
  }

  async function loadMoviesFromJSON() {
    try {
      moviesGrid.innerHTML = '<div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Menyiapkan data...</div>';
      const response = await fetch('./assets/data/db.json');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      if (!Array.isArray(data)) throw new Error('Format JSON salah');
      moviesData = data.map((item, idx) => ({
        id: item.id || idx + 1,
        title: item.title || item.name || 'Tanpa judul',
        link: item.link || item.url || item.download_url || '#',
        image: item.image || ''
      }));
      applyFilters();
    } catch (error) {
      console.error(error);
      moviesGrid.innerHTML = '<div class="error-message"><i class="fas fa-database"></i> Gagal memuat data dari assets/data/data.json</div>';
      moviesData = [];
    }
  }

  closeModalBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('active')) closeModal(); });
  searchBtn.addEventListener('click', performSearch);
  searchInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') performSearch(); });
  viewAllBtn.addEventListener('click', resetAll);
  limitSelect.addEventListener('change', (e) => {
    itemsPerPage = parseInt(e.target.value);
    currentPage = 1;
    renderPagination();
    renderCurrentPageMovies();
  });

  loadMoviesFromJSON();
</script>
</body>
</html>
