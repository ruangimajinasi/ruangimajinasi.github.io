<script>
  // Offcanvas toggle
  const requestPanel = document.getElementById('request');
  const requestBtn = document.getElementById('requestBtn');
  const closeOffcanvasBtn = document.getElementById('closeOffcanvasBtn');

  requestBtn.addEventListener('click', (e) => {
    e.preventDefault();
    requestPanel.classList.add('active');
    document.body.style.overflow = 'hidden';
  });

  function closeOffcanvas() {
    requestPanel.classList.remove('active');
    document.body.style.overflow = '';
  }

  closeOffcanvasBtn.addEventListener('click', closeOffcanvas);
  requestPanel.addEventListener('click', (e) => { if (e.target === requestPanel) closeOffcanvas(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && requestPanel.classList.contains('active')) closeOffcanvas(); });
</script>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzIOeOXHQhj6OFbZe9ote9oCOINTfrCwTJzboCkaBdIHtXA2xegCiK2VpKVKF7XqQCL/exec';

<script>
  // ======================== GLOBAL VARIABLES ========================
  let moviesData = [];           // semua film dari JSON
  let filteredMovies = [];       // hasil filter (genre + search)
  
  // Pagination state
  let currentPage = 1;
  let itemsPerPage = 28;          // default 9
  
  // Search state
  let currentSearchQuery = '';
  let currentSource = 'movies';
  
  // DOM elements
  const moviesGrid = document.getElementById('moviesGrid');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const viewAllBtn = document.getElementById('viewAllBtn');
  const limitSelect = document.getElementById('limitSelect');
  const paginationContainer = document.getElementById('paginationContainer');
  const modal = document.getElementById('videoModal');
  const youtubeIframe = document.getElementById('youtubeIframe');
  const modalMovieTitle = document.getElementById('modalMovieTitle');
  const modalMovieDesc = document.getElementById('modalMovieDesc');
  const closeModalBtn = document.getElementById('closeModalBtn');
  
  // ======================== FUNGSI UTAMA ========================
  function applyFilters() {
    let result = [...moviesData];
    if (currentSearchQuery.trim() !== '') {
      const query = currentSearchQuery.trim().toLowerCase();
      result = result.filter(movie => movie.title.toLowerCase().includes(query));
    }
    filteredMovies = result;
    currentPage = 1;
    renderPagination();
    renderCurrentPageMovies();
  }
  
  function renderCurrentPageMovies() {
    if (!filteredMovies.length) {
      moviesGrid.innerHTML = `<div class="empty-message"><i class="fas fa-film-slash"></i><br/>Tidak ada film yang cocok</div>`;
      return;
    }
    
    const startIdx = (currentPage - 1) * itemsPerPage;
    const endIdx = startIdx + itemsPerPage;
    const pageMovies = currentSource === 'movies'
      ? [...filteredMovies].reverse().slice(startIdx, endIdx)
      : [...filteredMovies].slice(startIdx, endIdx);
    
    if (currentSource === 'movies') {
      // ===== MOVIE CARD STYLE (from index.html) =====
      let cardsHTML = '';
      for (let movie of pageMovies) {
        const imgSrc = movie.image && movie.image.trim() !== "" ? movie.image : "https://placehold.co/600x900/252f3f/FFB347?text=NO+POSTER";
        
        cardsHTML += `
          <div class="movie-card" data-id="${movie.id}">
            <div class="card-img">
              <img src="${imgSrc}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/600x900/252f3f/FFB347?text=NO+POSTER'">
              <div class="card-content">
                <div class="movie-title">${escapeHtml(movie.title)}</div>
                <div class="action-buttons">
                  <button class="btn-watch watch-btn" onclick="ads()" data-id="${movie.id}"><i class="fas fa-play"></i> Tonton</button>
                  <button class="bookmark" data-id="${movie.id}"><i class="far fa-bookmark"></i></button>
                </div>
              </div>
            </div>
          </div>
        `;
      }
      moviesGrid.innerHTML = cardsHTML;
      
      document.querySelectorAll('.watch-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const movies = parseInt(btn.dataset.id);
          const movie = moviesData.find(m => m.id === movies);
          if (movie) openVideoModal(movie);
        });
      });
      document.querySelectorAll('.bookmark').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const movies = parseInt(btn.dataset.id);
          const movie = moviesData.find(m => m.id === movies);
          const icon = btn.querySelector('i');
          if (icon.classList.contains('far')) {
            icon.classList.remove('far');
            icon.classList.add('fas');
            icon.style.color = '#ff9142';
            alert(`📌 ${movie.title} ditambahkan ke bookmark!`);
          } else {
            icon.classList.remove('fas');
            icon.classList.add('far');
            icon.style.color = '#aaaaee';
            alert(`🗑️ ${movie.title} dihapus dari bookmark`);
          }
        });
      });
      document.querySelectorAll('.movie-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if(e.target.classList.contains('bookmark') || e.target.classList.contains('watch-btn') || e.target.closest('.bookmark') || e.target.closest('.watch-btn')) return;
          const id = parseInt(card.dataset.id);
          const movie = moviesData.find(m => m.id === id);
          if(movie) openVideoModal(movie);
        });
      });
    } else {
      // ===== DB STYLE (from db.html) =====
      const cardsHTML = pageMovies.map(movie => {
        return `
          <div class="movie-cards mobile-single-column" data-id="${movie.id}">
            <div class="directory-main">
              <div class="directory-icon"><i class="fas fa-folder-open"></i></div>
              <div class="directory-meta">
                <div class="movie-title">${escapeHtml(movie.title)}</div>
                <div class="directory-subtitle">Ruang Imajinasi</div>
              </div>
            </div>
            <div class="action-buttons">
              <button class="btn-watch watch-btn" onclick="ads()" data-id="${movie.id}"><i class="fas fa-play"></i></button>
            </div>
          </div>
        `;
      }).join('');
      moviesGrid.innerHTML = cardsHTML;
      
      document.querySelectorAll('.watch-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(btn.dataset.id);
          const movie = moviesData.find(item => item.id === id);
          if (movie) openVideoModal(movie);
        });
      });
    }
  }
  
  function renderPagination() {
    const totalItems = filteredMovies.length;
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    if (totalPages <= 1) {
      paginationContainer.innerHTML = '';
      return;
    }
    
    let paginationHTML = '';
    // prev button
    paginationHTML += `<button class="page-btn" id="prevPageBtn" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> Prev</button>`;
    
    // page numbers
    const maxVisible = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
    let endPage = Math.min(totalPages, startPage + maxVisible - 1);
    if (endPage - startPage + 1 < maxVisible) {
      startPage = Math.max(1, endPage - maxVisible + 1);
    }
    
    if (startPage > 1) {
      paginationHTML += `<button class="page-btn page-num" data-page="1">1</button>`;
      if (startPage > 2) paginationHTML += `<span class="page-indicator">...</span>`;
    }
    
    for (let i = startPage; i <= endPage; i++) {
      paginationHTML += `<button class="page-btn page-num ${i === currentPage ? 'active-page' : ''}" data-page="${i}">${i}</button>`;
    }
    
    if (endPage < totalPages) {
      if (endPage < totalPages - 1) paginationHTML += `<span class="page-indicator">...</span>`;
      paginationHTML += `<button class="page-btn page-num" data-page="${totalPages}">${totalPages}</button>`;
    }
    
    // next button
    paginationHTML += `<button class="page-btn" id="nextPageBtn" ${currentPage === totalPages ? 'disabled' : ''}>Next <i class="fas fa-chevron-right"></i></button>`;
    paginationContainer.innerHTML = paginationHTML;
    
    // event listeners for page buttons
    document.querySelectorAll('.page-num').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const page = parseInt(btn.dataset.page);
        if (!isNaN(page) && page !== currentPage) {
          currentPage = page;
          renderCurrentPageMovies();
          renderPagination();
          window.scrollTo({ top: 160, behavior: 'smooth' });
        }
      });
    });
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    if (prevBtn) prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderCurrentPageMovies(); renderPagination(); window.scrollTo({ top: 300, behavior: 'smooth' }); } });
    if (nextBtn) nextBtn.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderCurrentPageMovies(); renderPagination(); window.scrollTo({ top: 300, behavior: 'smooth' }); } });
  }
  
  // Helper functions
  function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }
  
  function openVideoModal(movie) {
    let embedUrl = currentSource === 'movies' ? (movie.movies || '') : (movie.link || '');
    if (!embedUrl) return;
    if (!/^https?:\/\//i.test(embedUrl)) {
      embedUrl = `https://playmogo.com/e/${embedUrl}`;
    }
    youtubeIframe.src = embedUrl;
    youtubeIframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
    youtubeIframe.allowFullscreen = true;
    modalMovieTitle.innerText = movie.title || 'Memutar Film';
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  
  function closeModal() {
    youtubeIframe.src = '';
    modal.classList.remove('active');
    document.body.style.overflow = '';
  }
  
  // search handlers
  function performSearch() {
    currentSearchQuery = searchInput.value;
    applyFilters();
  }

  function resetAll() {
    searchInput.value = '';
    currentSearchQuery = '';
    applyFilters();
  }
  
  // Load data dari JSON
  async function loadMoviesFromJSON(source) {
    currentSource = source || 'movies';
    moviesGrid.classList.toggle('db-active', currentSource === 'db');
    const filename = currentSource === 'movies' ? 'movies.json' : 'db.json';
    try {
      moviesGrid.innerHTML = `<div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Loading...</div>`;
      const response = await fetch(`./assets/data/${filename}`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      if (Array.isArray(data) && data.length) {
        if (currentSource === 'movies') {
          moviesData = data;
        } else {
          moviesData = data.map((item, idx) => ({
            id: item.id || idx + 1,
            title: item.title || item.name || 'Tanpa judul',
            link: item.link || item.url || item.download_url || '#',
            image: item.image || ''
          }));
        }
      } else {
        throw new Error('Format JSON salah');
      }
    } catch (error) {
      console.error(error);
      moviesGrid.innerHTML = `<div class="error-message"><i class="fas fa-database"></i> Gagal load ${filename}. Pastikan file ada.</div>`;
      moviesData = [];
    } finally {
      currentSearchQuery = '';
      searchInput.value = '';
      applyFilters();
    }
  }
  
  // Tab switching
  document.querySelectorAll('.tab-ds').forEach(tab => {
    tab.addEventListener('click', function() {
      const source = this.dataset.source;
      if (source === currentSource) return;
      
      document.querySelectorAll('.tab-ds').forEach(t => {
        t.style.background = 'transparent';
        t.style.color = '#b9c3da';
      });
      this.style.background = '#ff9142';
      this.style.color = '#0b0f1c';
      
      document.querySelector('.section-title h3').innerHTML = source === 'movies'
        ? '<i class="fas fa-film"></i> Koleksi Bokep Terbaru'
        : '<i class="fas fa-database"></i> Database Bokep';
      
      moviesGrid.classList.toggle('db-active', source === 'db');
      loadMoviesFromJSON(source);
    });
  });

  // Event Listeners
  closeModalBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('active')) closeModal(); });
  searchBtn.addEventListener('click', performSearch);
  searchInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') performSearch(); });
  viewAllBtn.addEventListener('click', resetAll);
  limitSelect.addEventListener('change', (e) => {
    itemsPerPage = parseInt(e.target.value);
    currentPage = 1;
    renderPagination();
    renderCurrentPageMovies();
  });
  
  loadMoviesFromJSON('movies');
</script>
</body>
</html>
