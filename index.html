<!-- MODAL VIDEO -->
<div id="videoModal" class="modal-video">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalMovieTitle">Memutar Film</h3>
      <button class="close-modal" id="closeModalBtn">&times;</button>
    </div>
    <div class="video-container">
      <iframe id="youtubeIframe" src="" allowfullscreen></iframe>
    </div>
    <div class="modal-info" id="modalMovieDesc"></div>
  </div>
</div>

<script src="assets/data/ads.js"></script>
<script>
  // ======================== GLOBAL VARIABLES ========================
  let moviesData = [];           // semua film dari JSON
  let filteredMovies = [];       // hasil filter (genre + search)
  
  // Pagination state
  let currentPage = 1;
  let itemsPerPage = 12;          // default 9
  
  // Filter state
  let activeGenre = 'all';
  let currentSearchQuery = '';
  
  // DOM elements
  const moviesGrid = document.getElementById('moviesGrid');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const viewAllBtn = document.getElementById('viewAllBtn');
  const limitSelect = document.getElementById('limitSelect');
  const paginationContainer = document.getElementById('paginationContainer');
  const modal = document.getElementById('videoModal');
  const youtubeIframe = document.getElementById('youtubeIframe');
  const modalMovieTitle = document.getElementById('modalMovieTitle');
  const modalMovieDesc = document.getElementById('modalMovieDesc');
  const closeModalBtn = document.getElementById('closeModalBtn');
  
  // ======================== FUNGSI UTAMA ========================
  function applyFilters() {
    let result = [...moviesData];
    if (activeGenre !== 'all') {
      result = result.filter(movie => movie.genre === activeGenre);
    }
    if (currentSearchQuery.trim() !== '') {
      const query = currentSearchQuery.trim().toLowerCase();
      result = result.filter(movie => movie.title.toLowerCase().includes(query));
    }
    filteredMovies = result;
    currentPage = 1;   // reset ke halaman pertama saat filter berubah
    renderPagination();
    renderCurrentPageMovies();
  }
  
  function renderCurrentPageMovies() {
    if (!filteredMovies.length) {
      moviesGrid.innerHTML = `<div class="empty-message"><i class="fas fa-film-slash"></i><br/>Tidak ada film yang cocok</div>`;
      return;
    }
    
    const startIdx = (currentPage - 1) * itemsPerPage;
    const endIdx = startIdx + itemsPerPage;
    const pageMovies = [...filteredMovies].reverse().slice(startIdx, endIdx);
    
    let cardsHTML = '';
    for (let movie of pageMovies) {
      const imgSrc = movie.image && movie.image.trim() !== "" ? movie.image : "https://placehold.co/600x900/252f3f/FFB347?text=NO+POSTER";
      
      cardsHTML += `
        <div class="movie-card" data-id="${movie.id}">
          <div class="card-img">
            <img src="${imgSrc}" alt="${movie.title}" loading="lazy" onerror="this.src='https://placehold.co/600x900/252f3f/FFB347?text=NO+POSTER'">
            <div class="card-content">
              <div class="movie-title">${escapeHtml(movie.title)}</div>
              <div class="action-buttons">
                <button class="btn-watch watch-btn" onclick="ads()" data-id="${movie.id}"><i class="fas fa-play"></i> Tonton</button>
                <button class="bookmark" data-id="${movie.id}"><i class="far fa-bookmark"></i></button>
              </div>
            </div>
          </div>
        </div>
      `;
    }
    moviesGrid.innerHTML = cardsHTML;
    
    // Attach event listeners
    document.querySelectorAll('.watch-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const movies = parseInt(btn.dataset.id);
        const movie = moviesData.find(m => m.id === movies);
        if (movie) openVideoModal(movie);
      });
    });
    document.querySelectorAll('.bookmark').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const movies = parseInt(btn.dataset.id);
        const movie = moviesData.find(m => m.id === movies);
        const icon = btn.querySelector('i');
        if (icon.classList.contains('far')) {
          icon.classList.remove('far');
          icon.classList.add('fas');
          icon.style.color = '#ff9142';
          alert(`📌 ${movie.title} ditambahkan ke bookmark!`);
        } else {
          icon.classList.remove('fas');
          icon.classList.add('far');
          icon.style.color = '#aaaaee';
          alert(`🗑️ ${movie.title} dihapus dari bookmark`);
        }
      });
    });
    document.querySelectorAll('.movie-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if(e.target.classList.contains('bookmark') || e.target.classList.contains('watch-btn') || e.target.closest('.bookmark') || e.target.closest('.watch-btn')) return;
        const id = parseInt(card.dataset.id);
        const movie = moviesData.find(m => m.id === id);
        if(movie) openVideoModal(movie);
      });
    });
  }
  
  function renderPagination() {
    const totalItems = filteredMovies.length;
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    if (totalPages <= 1) {
      paginationContainer.innerHTML = '';
      return;
    }
    
    let paginationHTML = '';
    // prev button
    paginationHTML += `<button class="page-btn" id="prevPageBtn" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> Prev</button>`;
    
    // page numbers
    const maxVisible = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
    let endPage = Math.min(totalPages, startPage + maxVisible - 1);
    if (endPage - startPage + 1 < maxVisible) {
      startPage = Math.max(1, endPage - maxVisible + 1);
    }
    
    if (startPage > 1) {
      paginationHTML += `<button class="page-btn page-num" data-page="1">1</button>`;
      if (startPage > 2) paginationHTML += `<span class="page-indicator">...</span>`;
    }
    
    for (let i = startPage; i <= endPage; i++) {
      paginationHTML += `<button class="page-btn page-num ${i === currentPage ? 'active-page' : ''}" data-page="${i}">${i}</button>`;
    }
    
    if (endPage < totalPages) {
      if (endPage < totalPages - 1) paginationHTML += `<span class="page-indicator">...</span>`;
      paginationHTML += `<button class="page-btn page-num" data-page="${totalPages}">${totalPages}</button>`;
    }
    
    // next button
    paginationHTML += `<button class="page-btn" id="nextPageBtn" ${currentPage === totalPages ? 'disabled' : ''}>Next <i class="fas fa-chevron-right"></i></button>`;
    paginationContainer.innerHTML = paginationHTML;
    
    // event listeners for page buttons
    document.querySelectorAll('.page-num').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const page = parseInt(btn.dataset.page);
        if (!isNaN(page) && page !== currentPage) {
          currentPage = page;
          renderCurrentPageMovies();
          renderPagination();
          window.scrollTo({ top: 160, behavior: 'smooth' });
        }
      });
    });
    const prevBtn = document.getElementById('prevPageBtn');
    const nextBtn = document.getElementById('nextPageBtn');
    if (prevBtn) prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderCurrentPageMovies(); renderPagination(); window.scrollTo({ top: 300, behavior: 'smooth' }); } });
    if (nextBtn) nextBtn.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderCurrentPageMovies(); renderPagination(); window.scrollTo({ top: 300, behavior: 'smooth' }); } });
  }
  
  // Helper functions
  function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }
  
  function openVideoModal(movie) {
    let embedUrl = movie.movies || '';
    if (!embedUrl) return;
    if (!/^https?:\/\//i.test(embedUrl)) {
      embedUrl = `https://dood.re/e/${embedUrl}`;
    }
    youtubeIframe.src = embedUrl;
    youtubeIframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
    youtubeIframe.allowFullscreen = true;
    modalMovieTitle.innerText = movie.title || 'Memutar Film';
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  
  function closeModal() {
    youtubeIframe.src = '';
    modal.classList.remove('active');
    document.body.style.overflow = '';
  }
  
  // filter & search handlers
  function setActiveGenre(genre) {
    activeGenre = genre;
    document.querySelectorAll('.chip').forEach(chip => {
      if (chip.dataset.genre === genre) chip.classList.add('active');
      else chip.classList.remove('active');
    });
    applyFilters();
  }
  
  function performSearch() {
    currentSearchQuery = searchInput.value;
    applyFilters();
  }
  
  function resetAll() {
    searchInput.value = '';
    currentSearchQuery = '';
    setActiveGenre('all');
  }
  
  function initFilters() {
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => setActiveGenre(chip.dataset.genre));
    });
  }
  
  // Load data dari movies.json
  async function loadMoviesFromJSON() {
    try {
      moviesGrid.innerHTML = `<div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Menyiapkan data...</div>`;
      const response = await fetch('./assets/data/movies.json');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      if (Array.isArray(data) && data.length) {
        moviesData = data;
      } else {
        throw new Error('Format JSON salah');
      }
    } catch (error) {
      console.error(error);
      moviesGrid.innerHTML = `<div class="error-message"><i class="fas fa-database"></i> Gagal load movies.json. Pastikan file ada.</div>`;
      moviesData = [];
    } finally {
      initFilters();
      applyFilters(); // akan trigger render & pagination
    }
  }
  
  // Event Listeners
  closeModalBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('active')) closeModal(); });
  searchBtn.addEventListener('click', performSearch);
  searchInput.addEventListener('keyup', (e) => { if (e.key === 'Enter') performSearch(); });
  viewAllBtn.addEventListener('click', resetAll);
  limitSelect.addEventListener('change', (e) => {
    itemsPerPage = parseInt(e.target.value);
    currentPage = 1;
    renderPagination();
    renderCurrentPageMovies();
  });
  
  loadMoviesFromJSON();
</script>
